services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        APP_UID: ${UID:-1000}
        APP_GID: ${GID:-1000}
    image: rag-api:latest
    network_mode: host
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
      CHROMA_PERSIST_DIR: /app/data/vector_db
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import json,urllib.request; data=json.load(urllib.request.urlopen('http://localhost:8000/ready', timeout=3)); raise SystemExit(0 if data.get('ready') else 1)"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 10s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    image: rag-ui:latest
    ports:
      - "3000:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_healthy

